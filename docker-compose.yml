services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: orator
      POSTGRES_PASSWORD: orator
      POSTGRES_DB: orator_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orator"]
      interval: 2s
      timeout: 5s
      retries: 10

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: orator_test
      MYSQL_USER: orator
      MYSQL_PASSWORD: orator
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysql", "-u", "orator", "-porator", "-e", "SELECT 1"]
      interval: 2s
      timeout: 5s
      retries: 10
